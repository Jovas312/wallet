<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet API - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">💳 Wallet API</div>
    </nav>

    <main class="container">
        <section class="card-view">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Correo Electrónico</label>
                    <input type="email" id="loginEmail" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>
                <button type="submt" class="btn-primary"> <a href="dashboard.html">Ingresar</a></button>
            </form>
            <p class="switch-text">¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
        </section>
    </main>

    <footer class="desarrolladores">
        <p>Desarrolladores:</p>
        <br>
        <ul>
            <li>Jovany Alvarez</li>
            <li>Axel Torres</li>
        </ul>
    </footer>

    <script src="app.js"></script>
</body>

</html>
